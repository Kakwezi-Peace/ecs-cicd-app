name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::405894843300:role/GitHubActionsECSRole
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ecs-cicd-lab-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create taskdef.json and appspec.json
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          cat > taskdef.json << EOF
          {
            "family": "ecs-cicd-lab-task",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "arn:aws:iam::405894843300:role/ecs-cicd-lab-ecs-execution-role",
            "taskRoleArn": "arn:aws:iam::405894843300:role/ecs-cicd-lab-ecs-task-role",
            "containerDefinitions": [
              {
                "name": "ecs-cicd-lab-container",
                "image": "<IMAGE1_NAME>",
                "portMappings": [
                  {
                    "containerPort": 8080,
                    "protocol": "tcp"
                  }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/ecs-cicd-lab",
                    "awslogs-region": "eu-north-1",
                    "awslogs-stream-prefix": "ecs"
                  }
                },
                "essential": true
              }
            ]
          }
          EOF

          cat > appspec.json << EOF
          {
            "version": 1,
            "Resources": [
              {
                "TargetService": {
                  "Type": "AWS::ECS::Service",
                  "Properties": {
                    "TaskDefinition": "<TASK_DEFINITION>",
                    "LoadBalancerInfo": {
                      "ContainerName": "ecs-cicd-lab-container",
                      "ContainerPort": 8080
                    }
                  }
                }
              }
            ]
          }
          EOF

      - name: Upload deployment files to S3
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          sed -i "s|<IMAGE1_NAME>|$IMAGE_URI|g" taskdef.json
          zip deploy-artifacts.zip taskdef.json appspec.json
          aws s3 cp deploy-artifacts.zip s3://ecs-cicd-lab-artifacts-405894843300/deploy-artifacts.zip
          echo "Files uploaded to S3 successfully"
